<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Team — Итоги по месяцам</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --border-muted: #21262d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --accent-muted: #1f3a5c;
    --green: #3fb950;
    --green-muted: #1a3a22;
    --red: #f85149;
    --red-muted: #3a1a1a;
    --yellow: #d29922;
    --yellow-muted: #2e2a14;
    --purple: #bc8cff;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Inter', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  .gh-header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .gh-logo { display: flex; align-items: center; gap: 8px; }
  .gh-logo svg { color: var(--text); }
  .gh-repo-path {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .gh-repo-path .repo-name { color: var(--accent); font-weight: 600; }
  .gh-repo-path .sep { color: var(--text-dim); }
  .gh-header-right { margin-left: auto; display: flex; gap: 8px; }

  /* SEARCH BAR */
  .search-container {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 600px;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 12px 6px 34px;
    font-family: var(--font-sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-results-count {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 56px - 50px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px - 50px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 6px 20px;
    margin-bottom: 2px;
  }
  .month-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    font-family: var(--font-sans);
    font-size: 13px;
    transition: background 0.1s, color 0.1s;
    border-left: 3px solid transparent;
  }
  .month-btn:hover { background: var(--bg-secondary); color: var(--text); }
  .month-btn.active {
    background: var(--bg-secondary);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .month-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .month-label { flex: 1; }
  .month-tag {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--bg-tertiary);
    color: var(--text-dim);
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 20px;
  }

  .sidebar-meta {
    padding: 6px 20px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* MAIN CONTENT */
  .main { padding: 24px 32px; overflow-y: auto; }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .page-title-wrap {}
  .page-breadcrumb {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .page-title-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-weight: 400;
    font-family: var(--font-mono);
  }
  .compare-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.15s, border-color 0.15s;
  }
  .compare-btn:hover { background: var(--bg-tertiary); border-color: var(--accent); }
  .compare-btn.active { border-color: var(--accent); color: var(--accent); }

  /* METRICS GRID */
  .metrics-section { margin-bottom: 28px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .section-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .section-line {
    flex: 1; height: 1px;
    background: var(--border);
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .metric-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .metric-card:hover { border-color: var(--text-dim); }
  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .metric-card.green::before { background: var(--green); }
  .metric-card.red::before { background: var(--red); }
  .metric-card.yellow::before { background: var(--yellow); }
  .metric-card.neutral::before { background: var(--border); }

  .metric-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
    line-height: 1.3;
  }
  .metric-value {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  .metric-delta {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
  }
  .metric-delta.up { color: var(--green); }
  .metric-delta.down { color: var(--red); }
  .metric-delta.neutral { color: var(--text-muted); }
  .metric-prev { color: var(--text-dim); font-size: 11px; margin-left: auto; }

  .metric-target {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-muted);
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* INITIATIVES */
  .initiatives-section { margin-bottom: 28px; }
  .initiative-group {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .initiative-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .initiative-group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .initiative-count {
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 7px;
    color: var(--text-muted);
  }
  .initiative-chevron {
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .initiative-group.collapsed .initiative-chevron { transform: rotate(-90deg); }
  .initiative-list { padding: 4px 0; }
  .initiative-group.collapsed .initiative-list { display: none; }

  .initiative-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-muted);
    transition: background 0.1s;
  }
  .initiative-item:last-child { border-bottom: none; }
  .initiative-item:hover { background: rgba(255,255,255,0.02); }
  .initiative-item.highlight { background: rgba(88,166,255,0.06); }
  .initiative-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 20px;
    margin-top: 1px;
  }
  .initiative-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .initiative-text mark {
    background: rgba(210, 153, 34, 0.3);
    color: var(--yellow);
    border-radius: 2px;
    padding: 0 1px;
  }
  .initiative-icon {
    font-size: 12px;
    min-width: 16px;
    margin-top: 2px;
  }

  /* TARGETS BOX */
  .targets-box {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 28px;
  }
  .targets-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .targets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .target-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .target-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid var(--purple);
    margin-top: 4px;
    flex-shrink: 0;
  }

  /* CHART */
  .chart-section { margin-bottom: 28px; }
  .chart-wrap {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .chart-title {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-bottom: 14px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .chart-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .chart-legend-item.hidden { opacity: 0.35; }
  .legend-dot {
    width: 10px; height: 3px;
    border-radius: 2px;
  }
  canvas { width: 100% !important; }

  /* COMPARE MODE */
  .compare-section {
    display: none;
    margin-bottom: 24px;
  }
  .compare-section.visible { display: block; }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .compare-col-header {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    margin-bottom: 8px;
    text-align: center;
    padding: 6px;
    background: var(--bg-tertiary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .compare-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 5px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    width: 100%;
    margin-bottom: 8px;
  }

  /* TABS */
  .tab-nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab-btn {
    padding: 8px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 13px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-count {
    font-size: 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0 6px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .empty-state-icon { font-size: 32px; margin-bottom: 8px; }

  /* STATUS BADGE */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .status-pill.green { background: var(--green-muted); border-color: var(--green); color: var(--green); }
  .status-pill.red { background: var(--red-muted); border-color: var(--red); color: var(--red); }
  .status-pill.yellow { background: var(--yellow-muted); border-color: var(--yellow); color: var(--yellow); }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    background: var(--bg-secondary);
  }

  .section-stats-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    padding: 3px 10px;
    font-size: 11px;
    font-family: var(--font-sans);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .section-stats-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-muted);
  }

  /* BLOCK SCREEN HEADER */
  .block-screen-header {
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    padding-bottom: 0;
  }
  .block-screen-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 12px;
  }
  .block-back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    padding: 5px 12px;
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .block-back-btn:hover { color: var(--text); border-color: var(--text-dim); background: var(--bg-tertiary); }
  .block-screen-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: var(--font-mono);
    flex-wrap: wrap;
  }
  .bc-part { color: var(--text-dim); }
  .bc-sep { color: var(--text-dim); }
  .bc-active { color: var(--text); font-weight: 600; }
  .block-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .block-title-text { font-size: 20px; font-weight: 600; color: var(--text); }

  /* BLOCK HISTORY TABLE */
  .block-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 600px;
  }
  .block-table th {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.4;
  }
  .block-table th:first-child { text-align: left; min-width: 200px; }
  .metric-row-label {
    border: 1px solid var(--border);
    padding: 8px 12px;
    color: var(--text-muted);
    font-size: 12px;
    background: var(--bg-secondary);
    line-height: 1.4;
  }
  .metric-cell {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: center;
    background: var(--bg);
    white-space: nowrap;
  }
  .metric-cell.cell-green { background: var(--green-muted); }
  .metric-cell.cell-red   { background: var(--red-muted); }
  .metric-cell.cell-yellow { background: var(--yellow-muted); }
  .cell-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    display: block;
  }
  .cell-arrow { font-size: 9px; }
  .cell-arrow.up { color: var(--green); }
  .cell-arrow.down { color: var(--red); }

  /* BLOCK TARGETS GRID */
  .block-targets-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  @media (max-width: 1100px) {
    .block-targets-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .block-target-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .block-target-month {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .block-target-quarter {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .block-target-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .block-target-item .target-dot {
    margin-top: 4px;
    flex-shrink: 0;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* SEARCH HIGHLIGHT */
  .search-no-results {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    padding: 8px 16px;
  }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .compare-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="gh-header">

  <div class="gh-repo-path">
    <span>delivery-team</span>
    <span class="sep">/</span>
    <span class="repo-name">monthly-reports</span>
  </div>
  <div class="gh-header-right">
    <span class="status-pill green">● Q1 2026</span>
  </div>
</header>

<!-- SEARCH BAR -->
<div class="search-container">

};

const MONTH_ORDER = ['oct2025','nov2025','dec2025','jan2026','feb2026'];

// ============================================================
// NAVIGATION
// ============================================================
function selectMonth(month) {
  currentMonth = month;
  // If block screen is open, close it
  if (currentBlock) {
    currentBlock = null;
    currentBlockTab = null;
    document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screenBlock').style.display = 'none';
    document.getElementById('screenMonth').style.display = 'block';
  }
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + month).classList.add('active');
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabBtn = document.getElementById('tab-' + tab);
  if (tabBtn) tabBtn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'trends') renderCharts();
}

function openBlock(blockId) {
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('block-btn-' + blockId).classList.add('active');

  currentBlock = blockId;

  // Switch screens
  document.getElementById('screenMonth').style.display = 'none';
  document.getElementById('screenBlock').style.display = 'block';

  // Update breadcrumb
  const meta = BLOCK_META[blockId];
  document.getElementById('blockBreadcrumbTitle').textContent = meta.icon + ' ' + meta.title;

  renderBlockPage(blockId);
}

function renderBlockPage(blockId) {
  const meta = BLOCK_META[blockId];
  const el = document.getElementById('blockContent');

  let html = `<div class="block-title-row"><span class="block-title-text">${meta.icon} ${meta.title}</span></div>`;

  // ── 1. METRICS TABLE ──────────────────────────────────────
  const allMetricLabels = [];
  MONTH_ORDER.forEach(mk => {
    (DATA[mk].metrics[blockId] || []).forEach(m => {
      if (!allMetricLabels.includes(m.label)) allMetricLabels.push(m.label);
    });
  });

  if (allMetricLabels.length > 0) {
    html += `<div class="metrics-section">
      <div class="section-header">
        <div class="section-icon">📊</div>
        <div class="section-title">История метрик</div>
        <div class="section-line"></div>
      </div>
      <div style="overflow-x:auto;">
      <table class="block-table">
        <thead><tr>
          <th>Метрика</th>
          ${MONTH_ORDER.map(mk => `<th>${DATA[mk].title}<br><span style="font-weight:400;color:var(--text-dim);font-size:10px">${DATA[mk].quarter}</span></th>`).join('')}
        </tr></thead>
        <tbody>`;
    allMetricLabels.forEach(label => {
      html += `<tr><td class="metric-row-label">${label}</td>`;
      MONTH_ORDER.forEach(mk => {
        const m = (DATA[mk].metrics[blockId] || []).find(x => x.label === label);
        if (m) {
          const arrow = m.better === true ? '▲' : m.better === false ? '▼' : '';
          const cls = m.status === 'green' ? 'cell-green' : m.status === 'red' ? 'cell-red' : m.status === 'yellow' ? 'cell-yellow' : '';
          html += `<td class="metric-cell ${cls}"><span class="cell-value">${m.value}</span>${arrow ? `<span class="cell-arrow ${m.better ? 'up' : 'down'}">${arrow}</span>` : ''}</td>`;
        } else {
          html += `<td class="metric-cell"><span style="color:var(--text-dim)">—</span></td>`;
        }
      });
      html += '</tr>';
    });
    html += `</tbody></table></div></div>`;
  } else {
    html += `<div class="empty-state"><div class="empty-state-icon">📭</div><div>Метрики не отслеживаются</div></div>`;
  }

  // ── 2. TARGETS ────────────────────────────────────────────
  html += `<div class="metrics-section" style="margin-top:28px;">
    <div class="section-header">
      <div class="section-icon">🎯</div>
      <div class="section-title">Цели по кварталам</div>
      <div class="section-line"></div>
    </div>
    <div class="block-targets-grid">`;
  MONTH_ORDER.forEach(mk => {
    const d = DATA[mk];
    const targets = [...(d.targets[blockId] || [])];
    if (targets.length === 0 && blockId === 'risks') targets.push('Отсутствие рисков и санкционных потерь');
    html += `<div class="block-target-card">
      <div class="block-target-month">${d.title}</div>
      <div class="block-target-quarter">${d.quarter}</div>
      ${targets.map(t => `<div class="block-target-item"><span class="target-dot"></span>${t}</div>`).join('')}
      ${targets.length === 0 ? '<div style="color:var(--text-dim);font-size:11px;font-family:var(--font-mono)">—</div>' : ''}
    </div>`;
  });
  html += '</div></div>';

  // ── 3. INITIATIVES ────────────────────────────────────────
  const initiativeKey = {
    speed: '🚀 Высокая скорость доставки',
    quality: '✅ Высокое качество доставки',
    economics: '💰 Высокая экономическая эффективность',
    risks: '🛡️ Минимум рисков и штрафов',
    it: '⚙️ Стабильность IT продуктов',
  }[blockId];

  html += `<div class="metrics-section" style="margin-top:28px;">
    <div class="section-header">
      <div class="section-icon">📋</div>
      <div class="section-title">Инициативы по месяцам</div>
      <div class="section-line"></div>
    </div>`;
  MONTH_ORDER.slice().reverse().forEach(mk => {
    const d = DATA[mk];
    const items = d.initiatives[initiativeKey] || [];
    if (items.length === 0) return;
    html += `<div class="initiative-group" style="margin-bottom:8px;">
      <div class="initiative-group-header" onclick="this.closest('.initiative-group').classList.toggle('collapsed')">
        <div class="initiative-group-title">${d.title} <span style="color:var(--text-dim);font-weight:400;font-size:11px">${d.quarter}</span></div>
        <span class="initiative-count">${items.length}</span>
        <svg class="initiative-chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M12.78 5.22a.749.749 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.06 0L3.22 6.28a.749.749 0 1 1 1.06-1.06L8 8.939l3.72-3.719a.749.749 0 0 1 1.06 0Z"/>
        </svg>
      </div>
      <div class="initiative-list">
        ${items.map((item, i) => `<div class="initiative-item"><span class="initiative-num">${i+1}.</span><span class="initiative-text">${item}</span></div>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function closeBlock() {
  currentBlock = null;
  currentBlockTab = null;
  document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('active'));

  // Switch screens back
  document.getElementById('screenBlock').style.display = 'none';
  document.getElementById('screenMonth').style.display = 'block';

  // Re-highlight the current month in sidebar
  document.getElementById('btn-' + currentMonth).classList.add('active');
}

function scrollToSection(id) {
  if (currentTab !== 'overview') switchTab('overview');
  setTimeout(() => {
    const el = document.getElementById('section-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function toggleCompare() {
  compareMode = !compareMode;
  const btn = document.getElementById('compareToggle');
  const sec = document.getElementById('compareSection');
  btn.classList.toggle('active', compareMode);
  sec.classList.toggle('visible', compareMode);
  if (compareMode) renderCompare();
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim().toLowerCase();
  if (currentTab !== 'initiatives') switchTab('initiatives');
  renderInitiatives();
  updateSearchCount();
});

function updateSearchCount() {
  const el = document.getElementById('searchCount');
  if (!searchQuery) { el.textContent = ''; return; }
  const count = document.querySelectorAll('.initiative-item.highlight').length;
  el.textContent = count + ' совпад.';
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderSection(id, icon, title, metrics, targets) {
  let html = `<div class="metrics-section" id="section-${id}">
    <div class="section-header">
      <div class="section-icon">${icon}</div>
      <div class="section-title">${title}</div>
      <div class="section-line"></div>
      ${`<button class="section-stats-btn" onclick="openBlock('${id}')">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.75V13.5h13.75a.75.75 0 0 1 0 1.5H.75a.75.75 0 0 1-.75-.75V1.75a.75.75 0 0 1 1.5 0Zm14.28 2.53-5.25 5.25a.75.75 0 0 1-1.06 0L7 7.06 4.28 9.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.25-3.25a.75.75 0 0 1 1.06 0L10 7.94l4.72-4.72a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042Z"/></svg>
        Статистика блока
      </button>`}
    </div>`;

  if (metrics && metrics.length > 0) {
    html += '<div class="metrics-grid">';
    metrics.forEach(m => {
      const arrow = m.better === true ? '▲' : m.better === false ? '▼' : '—';
      const deltaClass = m.better === true ? 'up' : m.better === false ? 'down' : 'neutral';
      html += `<div class="metric-card ${m.status}">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value">${m.value}</div>
        <div class="metric-delta ${deltaClass}">
          ${arrow} ${m.delta}
          <span class="metric-prev">vs ${m.prevLabel}: ${m.prev}</span>
        </div>
        ${m.target ? `<div class="metric-target">🎯 цель: ${m.target}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  if (targets && targets.length > 0) {
    html += `<div class="targets-box" style="margin-top:12px;">
      <div class="targets-title">🎯 Цели квартала</div>
      <div class="targets-grid">`;
    targets.forEach(t => {
      html += `<div class="target-item"><div class="target-dot"></div><span>${t}</span></div>`;
    });
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

function renderInitiatives() {
  const d = DATA[currentMonth];
  const el = document.getElementById('initiativesContent');
  let html = '';
  let totalCount = 0;
  let matchCount = 0;

  const groups = d.initiatives;
  Object.entries(groups).forEach(([groupName, items]) => {
    if (!items || items.length === 0) return;
    totalCount += items.length;

    const filtered = searchQuery
      ? items.filter(i => i.toLowerCase().includes(searchQuery))
      : items;

    if (searchQuery && filtered.length === 0) return;
    matchCount += filtered.length;

    html += `<div class="initiative-group" id="grp-${groupName}">
      <div class="initiative-group-header" onclick="toggleGroup('grp-${encodeURIComponent(groupName)}')">
        <div class="initiative-group-title">${groupName}</div>
        <span class="initiative-count">${filtered.length}</span>
        <svg class="initiative-chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M12.78 5.22a.749.749 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.06 0L3.22 6.28a.749.749 0 1 1 1.06-1.06L8 8.939l3.72-3.719a.749.749 0 0 1 1.06 0Z"/>
        </svg>
      </div>
      <div class="initiative-list">`;

    (searchQuery ? filtered : items).forEach((item, i) => {
      const isMatch = searchQuery && item.toLowerCase().includes(searchQuery);
      html += `<div class="initiative-item ${isMatch ? 'highlight' : ''}">
        <span class="initiative-num">${i + 1}.</span>
        <span class="initiative-text">${highlight(item, searchQuery)}</span>
      </div>`;
    });

    html += '</div></div>';
  });

  if (html === '') {
    html = `<div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div>Ничего не найдено по запросу «${searchQuery}»</div>
    </div>`;
  }

  el.innerHTML = html;
  document.getElementById('initiatives-count').textContent = searchQuery ? matchCount : totalCount;
  updateSearchCount();
}

function toggleGroup(id) {

// ============================================================
// CHARTS
// ============================================================
const months = ['Октябрь', 'Ноябрь', 'Декабрь', 'Январь', 'Февраль'];

const trendData = {
  service30Net:   [22.93, 22.67, 15.42, 3.25, 3.6],
  service30Msk:   [30.58, 29.84, 19.84, 3.32, 4.1],
  avgDelivery:    [51, 50, 55, 84, 72],
  latePct:        [9.46, 10.35, 10.81, 15.72, 18.49],
  appealsPct:     [0.62, 0.62, 0.68, 0.71, 0.68],
  loyaltyPerOrder:[4.7, 4.33, 5.66, 11.19, 12.44],
  deliveryCost:   [135.36, 135.68, 137.28, 141.42, 181.7],
  deliveryPct:    [11.62, 11.35, 11.28, 11.96, 12.6],
  ordersPerHour:  [3.98, 3.98, 4.14, 4.18, 4.35],
  downtime:       [977, 74, 73, 40, 12],
};

let charts = {};

function drawChart(canvasId, legendId, datasets, yLabel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (charts[canvasId]) charts[canvasId].destroy();

  const colors = ['#58a6ff','#3fb950','#f85149','#d29922','#bc8cff','#79c0ff'];

  // legend
  const legendEl = document.getElementById(legendId);
  legendEl.innerHTML = datasets.map((ds, i) =>
    `<span class="chart-legend-item" onclick="toggleSeries('${canvasId}','${ds.label}',this)">
      <span class="legend-dot" style="background:${colors[i % colors.length]}"></span>
      ${ds.label}
    </span>`
  ).join('');

  charts[canvasId] = {
    canvas, ctx, datasets, colors, yLabel,
    draw() {
      const W = canvas.width = canvas.offsetWidth;
      const H = canvas.height = canvas.offsetHeight || 200;
      ctx.clearRect(0, 0, W, H);

      const pad = { top: 20, right: 20, bottom: 40, left: 55 };
      const chartW = W - pad.left - pad.right;
      const chartH = H - pad.top - pad.bottom;
      const n = months.length;

      // find range
      const allVals = datasets.filter(ds => !ds.hidden).flatMap(ds => ds.data);
      if (allVals.length === 0) return;
      const minV = Math.min(...allVals);
      const maxV = Math.max(...allVals);
      const range = maxV - minV || 1;
      const padV = range * 0.15;
      const vMin = minV - padV;
      const vMax = maxV + padV;

      const xOf = i => pad.left + (i / (n - 1)) * chartW;
      const yOf = v => pad.top + chartH - ((v - vMin) / (vMax - vMin)) * chartH;

      // grid
      ctx.strokeStyle = '#21262d';
      ctx.lineWidth = 1;
      for (let g = 0; g <= 4; g++) {
        const y = pad.top + (g / 4) * chartH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
        const val = vMax - (g / 4) * (vMax - vMin);
        ctx.fillStyle = '#484f58';
        ctx.font = '10px JetBrains Mono, monospace';
        ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(val > 100 ? 0 : 2), pad.left - 6, y + 4);
      }

      // x labels
      ctx.fillStyle = '#8b949e';
      ctx.font = '11px Inter, sans-serif';
      ctx.textAlign = 'center';
      months.forEach((m, i) => ctx.fillText(m, xOf(i), H - 8));

      // lines
      datasets.forEach((ds, di) => {
        if (ds.hidden) return;
        const color = colors[di % colors.length];
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        // area
        ctx.beginPath();
        ds.data.forEach((v, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(v)) : ctx.lineTo(xOf(i), yOf(v)));
        ctx.lineTo(xOf(n-1), pad.top + chartH);
        ctx.lineTo(xOf(0), pad.top + chartH);
        ctx.closePath();
        ctx.fillStyle = color + '18';
        ctx.fill();

        ctx.beginPath();
        ds.data.forEach((v, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(v)) : ctx.lineTo(xOf(i), yOf(v)));
        ctx.stroke();

        // dots
        ds.data.forEach((v, i) => {
          ctx.beginPath();
          ctx.arc(xOf(i), yOf(v), 4, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#0d1117';
          ctx.lineWidth = 2;
          ctx.stroke();

          // value label
          ctx.fillStyle = color;
          ctx.font = '10px JetBrains Mono, monospace';
          ctx.textAlign = 'center';
          ctx.fillText(v, xOf(i), yOf(v) - 10);
        });
      });
    }
  };

  const obs = new ResizeObserver(() => charts[canvasId].draw());
  obs.observe(canvas);
  charts[canvasId].draw();
}

function toggleSeries(chartId, label, el) {
  const chart = charts[chartId];
  const ds = chart.datasets.find(d => d.label === label);
  if (ds) {
    ds.hidden = !ds.hidden;
    el.classList.toggle('hidden', ds.hidden);
    chart.draw();
  }
}

function renderCharts() {
  setTimeout(() => {
    drawChart('chart1', 'chart1-legend', [
      { label: '30-мин сервис Сеть %', data: trendData.service30Net },

      { label: 'Лояльность ₽/заказ', data: trendData.loyaltyPerOrder },
      { label: 'Обращения %', data: trendData.appealsPct },

    drawChart('chart3', 'chart3-legend', [

      { label: 'Заказов у курьера/час', data: trendData.ordersPerHour },
      { label: 'Недоступность (мин)', data: trendData.downtime },
    ]);
  }, 50);
}
